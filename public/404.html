<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Jordan Mitacek</title>
    <script>
      // SPA redirect for GitHub Pages
      // Stores the path and redirects to index.html which React Router handles
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.host + l.pathname.split('/').slice(0, 1).join('/') +
        '/?p=' + encodeURIComponent(l.pathname.slice(1) + (l.search ? '&q=' + encodeURIComponent(l.search.slice(1)) : '') + (l.hash ? '#' + l.hash.slice(1) : ''))
      );
    </script>
  </head>
  <body></body>
</html>
